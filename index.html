<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помощник сборщика ПК</title>
    
    <!-- Подключаем PyScript ПРАВИЛЬНО -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        /* Чат-интерфейс */
        .chat-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .messages {
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .bot-message .message-content {
            background: #e3f2fd;
            color: #0d47a1;
            border-bottom-left-radius: 5px;
        }
        
        .user-message .message-content {
            background: #4CAF50;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .system-message {
            justify-content: center;
        }
        
        .system-message .message-content {
            background: #ffd700;
            color: #333;
            font-weight: bold;
            text-align: center;
        }
        
        /* Область ввода */
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        #userInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        #userInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        button.reset {
            background: #f44336;
        }
        
        /* Кнопки-подсказки */
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .info-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🖥️ ПОМОЩНИК СБОРЩИКА ПК</h1>
                <p>Просто отвечайте на вопросы</p>
            </div>
            
            <div class="content">
                <!-- Статус загрузки -->
                <div class="status" id="status">
                    ⏳ Загрузка Python...
                </div>
                
                <!-- Чат -->
                <div class="chat-container">
                    <div class="messages" id="messages">
                        <div class="message system-message">
                            <div class="message-content">
                                Добро пожаловать! Я помогу проверить совместимость комплектующих
                            </div>
                        </div>
                    </div>
                    
                    <!-- Быстрые кнопки -->
                    <div class="quick-buttons" id="quickButtons"></div>
                    
                    <!-- Ввод -->
                    <div class="input-area">
                        <input type="text" id="userInput" placeholder="Введите ответ..." autocomplete="off">
                        <button onclick="sendMessage()">Отправить</button>
                        <button class="reset" onclick="resetChat()">↺</button>
                    </div>
                </div>
                
                <!-- Подсказка -->
                <div class="info-box">
                    <strong>💡 Примеры сокетов:</strong> AM4, AM5, LGA1700, LGA1200, LGA1151<br>
                    <strong>💡 Типы памяти:</strong> DDR3, DDR4, DDR5
                </div>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let pyodide = null;
        let pythonInput = '';
        let inputReady = false;
        let currentQuestion = '';
        
        // Инициализация
        async function init() {
            try {
                document.getElementById('status').innerHTML = '⏳ Загрузка Python...';
                
                // Загружаем Pyodide
                pyodide = await loadPyodide();
                
                document.getElementById('status').innerHTML = '✅ Python загружен!';
                
                // Загружаем нашу программу
                await loadProgram();
                
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Ошибка загрузки';
                console.error(error);
            }
        }
        
        // Загрузка программы
        async function loadProgram() {
            // Код программы на Python
            const program = `
import asyncio
from js import document, setTimeout

# База данных сокетов
socket_info = {
    'AM4': {'ram_types': ['DDR4']},
    'AM5': {'ram_types': ['DDR5']},
    'LGA1700': {'ram_types': ['DDR4', 'DDR5']},
    'LGA1200': {'ram_types': ['DDR4']},
    'LGA1151': {'ram_types': ['DDR4']},
}

# Функция для добавления сообщения в чат
def add_message(text, type='bot'):
    from js import document
    messages = document.getElementById('messages')
    div = document.createElement('div')
    div.className = f'message {type}-message'
    content = document.createElement('div')
    content.className = 'message-content'
    content.innerHTML = text.replace('\\n', '<br>')
    div.appendChild(content)
    messages.appendChild(div)
    messages.scrollTop = messages.scrollHeight

# Функция для получения ввода
async def get_input(prompt):
    global input_ready, user_input
    
    add_message(prompt)
    
    # Ждем ввод от пользователя
    while not input_ready:
        await asyncio.sleep(0.1)
    
    input_ready = False
    return user_input

# Основная программа
async def main():
    add_message("Здравствуйте! Давайте проверим совместимость ваших комплектующих.", 'system')
    await asyncio.sleep(0.5)
    
    while True:
        # Шаг 1: Процессор
        cpu = await get_input("🔧 Введите сокет ПРОЦЕССОРА (например, AM4):")
        cpu = cpu.strip().upper()
        add_message(f"✓ Выбрано: {cpu}")
        
        # Шаг 2: Материнская плата
        mb = await get_input("🔧 Введите сокет МАТЕРИНСКОЙ ПЛАТЫ:")
        mb = mb.strip().upper()
        add_message(f"✓ Выбрано: {mb}")
        
        # Проверка сокетов
        if cpu == mb:
            add_message("✅ Процессор и материнская плата СОВМЕСТИМЫ!", 'system')
            
            # Шаг 3: Память
            if cpu in socket_info:
                supported = ', '.join(socket_info[cpu]['ram_types'])
                ram = await get_input(f"🧠 Для {cpu} поддерживается: {supported}\\nВведите тип памяти (DDR3/DDR4/DDR5):")
                ram = ram.strip().upper()
                
                if ram in socket_info[cpu]['ram_types']:
                    add_message(f"✅ Память {ram} ПОДХОДИТ!", 'system')
                    
                    # Шаг 4: БП
                    try:
                        psu = await get_input("⚡ Введите мощность БЛОКА ПИТАНИЯ (Ватт):")
                        psu = int(psu.strip())
                        
                        if psu < 400:
                            add_message("⚠️ Блок питания СЛАБОВАТ (нужно минимум 400-500 Вт)", 'system')
                        elif psu < 600:
                            add_message("✅ Блок питания НОРМАЛЬНЫЙ", 'system')
                        else:
                            add_message("✅ Блок питания ОТЛИЧНЫЙ (с запасом)", 'system')
                        
                        add_message("🎉 ВСЕ КОМПОНЕНТЫ ПРОВЕРЕНЫ! Сборка возможна!", 'system')
                        
                    except:
                        add_message("❌ Ошибка: введите число", 'system')
                else:
                    add_message(f"❌ Память {ram} НЕ ПОДХОДИТ для {cpu}!", 'system')
            else:
                add_message("⚠️ Сокет не найден в базе, проверьте документацию", 'system')
        else:
            add_message(f"❌ НЕСОВМЕСТИМЫ! CPU: {cpu}, MB: {mb}", 'system')
        
        # Спросить про повтор
        again = await get_input("\\nХотите проверить другую сборку? (да/нет):")
        if again.lower() not in ['да', 'yes', 'y', 'д', 'lf']:
            add_message("🚀 Спасибо за использование! Удачной сборки!", 'system')
            break
        
        add_message("="*40, 'system')

# Запуск
asyncio.ensure_future(main())
            `;
            
            // Запускаем программу
            await pyodide.runPythonAsync(program);
        }
        
        // Отправка сообщения
        function sendMessage() {
            let input = document.getElementById('userInput').value;
            if (input) {
                // Показываем сообщение пользователя
                let messages = document.getElementById('messages');
                let div = document.createElement('div');
                div.className = 'message user-message';
                let content = document.createElement('div');
                content.className = 'message-content';
                content.textContent = input;
                div.appendChild(content);
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
                
                // Отправляем в Python
                window.user_input = input;
                window.input_ready = true;
                
                document.getElementById('userInput').value = '';
            }
        }
        
        // Сброс
        function resetChat() {
            document.getElementById('messages').innerHTML = `
                <div class="message system-message">
                    <div class="message-content">
                        Добро пожаловать! Я помогу проверить совместимость комплектующих
                    </div>
                </div>
            `;
            location.reload();
        }
        
        // Отправка по Enter
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Быстрые кнопки
        function addQuickButton(text) {
            let input = document.getElementById('userInput');
            input.value = text;
            sendMessage();
        }
        
        // Загружаем Pyodide
        const loadPyodide = async () => {
            return await pyodideLoader({
                indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
            });
        };
        
        // Старт
        init();
    </script>
    
    <!-- Загрузчик Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</body>
</html>
